- name: Clone blackbox_exporter repository
  git:
    repo: "https://github.com/prometheus/blackbox_exporter.git"
    dest: "/tmp/blackbox_exporter"
    version: "master"

- name: Build blackbox_exporter
  make:
    chdir: "/tmp/blackbox_exporter"
    target: build
  environment:
    PATH: "{{ ansible_env.HOME }}/.asdf/shims:{{ lookup('env', 'PATH') }}"
  become: true

- name: Move blackbox_exporter binary to /usr/local/bin
  copy:
    src: "/tmp/blackbox_exporter/blackbox_exporter"
    dest: /usr/local/bin/blackbox_exporter
    mode: '0755'
    remote_src: true
  become: true    