---
# Instala k3s standalone + ArgoCD e bootstrapa GitOps para qualquer VM.
#
# Uso:
#   ansible-playbook -i inventory/hosts.yml playbooks/setup-k3s.yml -e target=core-k3s
#   ansible-playbook -i inventory/hosts.yml playbooks/setup-k3s.yml -e target=homelab-monitoring
#   ansible-playbook -i inventory/hosts.yml playbooks/setup-k3s.yml -e target=homelab-dev

- name: "k3s + ArgoCD bootstrap"
  hosts: "{{ target }}"
  become: true
  gather_facts: true

  vars:
    remote_kubeconfig: "/etc/rancher/k3s/k3s.yaml"
    k3s_version: "v1.30.0+k3s1"
    argocd_version: "v3.3.0"
    homelab_gitops_repo: "https://github.com/ojasonw/homelab-gitops.git"

    infisical_client_id: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          33643233346633643135343734633337653733366437643132356137303733653434633938633763
          3833366236636431346138656233396163663230353938330a336365623366306564303964303731
          30373330376230393963376466326531386630303064336330336430623633323538663965323661
          6534666464663665640a656438336661316439333830333830333036643639346532383133396166
          37336133356333653231333864356132343034346532383838323239303732366162393832386263
          3536393634306163663239373536326536346238613430643331

    infisical_client_secret: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          33386462393438356537326339613062346237363065643032306464333662393734366434393037
          6438666462656663386233646466326439303039316338310a616332643637343634646365663533
          64656563396532363062613239613961316132653966323639626533356538303862356334663261
          3363613839313164360a613733613837373635386266343461643733383735313461663539396466
          34313536653866616338636132626539333931363232343261626536386435616565623466613638
          39626365616333613833636364316564663838383765316331633164376561626562376539653466
          38353136313338373637633231633864396230393333666432376135663266353735363466316637
          31636664383333623338

  tasks:
    # ── k3s ──────────────────────────────────────────────────────────────
    - name: "Instala k3s"
      ansible.builtin.shell: >
        curl -sfL https://get.k3s.io |
        INSTALL_K3S_VERSION={{ k3s_version }}
        INSTALL_K3S_EXEC="--disable=traefik --write-kubeconfig-mode=644"
        sh -
      args:
        creates: "{{ remote_kubeconfig }}"

    # ── ArgoCD ───────────────────────────────────────────────────────────
    - name: "Instala ArgoCD"
      ansible.builtin.shell: >
        kubectl --kubeconfig {{ remote_kubeconfig }}
        apply --server-side --force-conflicts
        -n argocd
        -f https://raw.githubusercontent.com/argoproj/argo-cd/{{ argocd_version }}/manifests/install.yaml
      changed_when: true

    - name: "Aguarda argocd-server"
      ansible.builtin.shell: >
        kubectl --kubeconfig {{ remote_kubeconfig }}
        -n argocd rollout status deployment/argocd-server --timeout=120s
      register: argocd_rollout
      until: argocd_rollout.rc == 0
      retries: 5
      delay: 15
      changed_when: false

    - name: "Desativa TLS interno do argocd-server"
      ansible.builtin.shell: >
        kubectl --kubeconfig {{ remote_kubeconfig }} -n argocd
        patch deployment argocd-server --type=json
        -p '[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--insecure"}]'
      changed_when: true

    - name: "Expõe argocd-server via NodePort 30080"
      ansible.builtin.shell: >
        kubectl --kubeconfig {{ remote_kubeconfig }} -n argocd
        patch svc argocd-server
        -p '{"spec":{"type":"NodePort","ports":[{"port":443,"name":"https","nodePort":30080}]}}'
      changed_when: true

    # ── GitOps bootstrap ─────────────────────────────────────────────────
    - name: "Bootstrap root-app → nodes/{{ inventory_hostname }}/apps"
      ansible.builtin.shell: |
        cat <<'EOF' | kubectl --kubeconfig {{ remote_kubeconfig }} apply -f -
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: root-app
          namespace: argocd
          finalizers:
            - resources-finalizer.argocd.argoproj.io
        spec:
          project: default
          source:
            repoURL: '{{ homelab_gitops_repo }}'
            targetRevision: main
            path: nodes/{{ inventory_hostname }}/apps
            directory:
              recurse: false
          destination:
            server: https://kubernetes.default.svc
            namespace: argocd
          syncPolicy:
            automated:
              prune: true
              selfHeal: true
            syncOptions:
              - CreateNamespace=true
        EOF
      changed_when: true

    - name: "Obtém senha do ArgoCD"
      ansible.builtin.shell: >
        kubectl --kubeconfig {{ remote_kubeconfig }}
        -n argocd get secret argocd-initial-admin-secret
        -o jsonpath='{.data.password}' | base64 -d
      register: argocd_password
      retries: 10
      delay: 15
      until: argocd_password.rc == 0
      changed_when: false

    - name: "Exibe senha do ArgoCD"
      ansible.builtin.debug:
        msg:
          - "========================================"
          - " ArgoCD em {{ inventory_hostname }}"
          - " Senha (admin): {{ argocd_password.stdout }}"
          - "========================================"

    # ── ingress-nginx ─────────────────────────────────────────────────────
    - name: "Instala ingress-nginx"
      ansible.builtin.shell: >
        kubectl --kubeconfig {{ remote_kubeconfig }}
        apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.7.1/deploy/static/provider/baremetal/deploy.yaml
      changed_when: true

    - name: "Aguarda ingress-nginx"
      ansible.builtin.shell: >
        kubectl --kubeconfig {{ remote_kubeconfig }} -n ingress-nginx
        rollout status deployment/ingress-nginx-controller --timeout=120s
      register: nginx_rollout
      until: nginx_rollout.rc == 0
      retries: 5
      delay: 10
      changed_when: false

    - name: "Cria Service LoadBalancer do ingress-nginx"
      ansible.builtin.shell: |
        cat <<'EOF' | kubectl --kubeconfig {{ remote_kubeconfig }} apply -f -
        apiVersion: v1
        kind: Service
        metadata:
          name: ingress-nginx-controller-loadbalancer
          namespace: ingress-nginx
        spec:
          selector:
            app.kubernetes.io/component: controller
            app.kubernetes.io/instance: ingress-nginx
            app.kubernetes.io/name: ingress-nginx
          ports:
          - name: http
            port: 80
            protocol: TCP
            targetPort: 80
          - name: https
            port: 443
            protocol: TCP
            targetPort: 443
          type: LoadBalancer
          externalTrafficPolicy: Local
        EOF
      changed_when: true

    - name: "Remove webhook do ingress-nginx"
      ansible.builtin.shell: >
        kubectl --kubeconfig {{ remote_kubeconfig }}
        delete validatingwebhookconfiguration ingress-nginx-admission --ignore-not-found
      changed_when: true

    # ── Infisical ─────────────────────────────────────────────────────────
    - name: "Bootstrap Secret Infisical"
      ansible.builtin.shell: |
        cat <<'EOF' | kubectl --kubeconfig {{ remote_kubeconfig }} apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: infisical-universal-auth
          namespace: external-secrets
        type: Opaque
        stringData:
          clientId: "{{ infisical_client_id }}"
          clientSecret: "{{ infisical_client_secret }}"
        EOF
      no_log: true
      changed_when: false

    - name: "Bootstrap ClusterSecretStore Infisical"
      ansible.builtin.shell: |
        cat <<'EOF' | kubectl --kubeconfig {{ remote_kubeconfig }} apply -f -
        apiVersion: external-secrets.io/v1
        kind: ClusterSecretStore
        metadata:
          name: infisical-dev
        spec:
          provider:
            infisical:
              hostAPI: https://us.infisical.com
              auth:
                universalAuthCredentials:
                  clientId:
                    name: infisical-universal-auth
                    namespace: external-secrets
                    key: clientId
                  clientSecret:
                    name: infisical-universal-auth
                    namespace: external-secrets
                    key: clientSecret
              secretsScope:
                projectSlug: "externalsecrets-i-rq2"
                environmentSlug: "dev"
                secretsPath: "/joga-together-dev"
        EOF
      changed_when: false
